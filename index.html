<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Knit Garment Manufacturer & Exporter in Tirupur | Aurevon Apparel</title>

    <!-- SEO Meta Tags -->
   <meta name="description" content="Aurevon Apparel is a premium knit garment manufacturer and exporter based in Tirupur, India. We provide high-quality apparel production, private labeling, and global export solutions for fashion brands.">   
   <meta name="keywords" content="garment manufacturer tirupur, aurevon apparel, knitwear manufacturer india, apparel exporter, private label clothing manufacturer, garment factory tirupur, apparel sourcing india">
   <meta name="author" content="Aurevon Apparel">

    <!-- OpenGraph Facebook Meta Tags -->
    <meta property="og:title" content="Aurevon Apparel | Premium Garment Manufacturing">
    <meta property="og:description"
        content="Tirupur-based premium garment manufacturing unit specializing in high-quality apparel production. Coming soon.">
    <meta property="og:image" content="assets/factory_hero.png">
    <meta property="og:url" content="https://www.aurevon.com">
    <meta property="og:type" content="website">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- PREMIUM ATOMIC PRELOADER -->
    <div id="page-preloader">
        <div class="preloader-content">
            <!-- Atomic System Container -->
            <div class="atom-container">
                <!-- Center Nucleus (Glow Core + Logo) -->
                <div class="atom-nucleus">
                    <svg class="preloader-logo-svg" width="36" height="36" viewBox="0 0 100 100" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="preloader-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#F3D082" />
                                <stop offset="50%" stop-color="#D4AF37" />
                                <stop offset="100%" stop-color="#9A7B2C" />
                            </linearGradient>
                        </defs>
                        <path d="M50 12 L82 82 L70 82 L50 45 L30 82 L18 82 L50 12 Z" fill="url(#preloader-gold-grad)" />
                        <path d="M50 45 L62 70 H38 L50 45 Z" fill="#070707" />
                        <path d="M50 12 L50 45 L30 82 L18 82 L50 12 Z" fill="rgba(255, 255, 255, 0.12)" />
                    </svg>
                </div>

                <!-- Orbit 1 (Horizontal) -->
                <div class="atom-orbit orbit-1">
                    <div class="atom-electron electron-1a"></div>
                    <div class="atom-electron electron-1b"></div>
                </div>

                <!-- Orbit 2 (Tilted 1) -->
                <div class="atom-orbit orbit-2">
                    <div class="atom-electron electron-2a"></div>
                    <div class="atom-electron electron-2b"></div>
                </div>

                <!-- Orbit 3 (Tilted 2) -->
                <div class="atom-orbit orbit-3">
                    <div class="atom-electron electron-3a"></div>
                    <div class="atom-electron electron-3b"></div>
                </div>

                <!-- Orbit 4 (Tilted 3) -->
                <div class="atom-orbit orbit-4">
                    <div class="atom-electron electron-4a"></div>
                    <div class="atom-electron electron-4b"></div>
                </div>
            </div>

            <div class="preloader-text-wrapper">
                <span class="preloader-title">AUREVON</span>
                <span class="preloader-sub">APPAREL</span>
            </div>
        </div>
    </div>

    <!-- Mouse glowing interactive background container -->
    <div id="interactive-glow"></div>

    <!-- MAIN APP WRAPPER -->
    <main class="app-container">

        <!-- HERO SECTION -->
        <header class="hero-section" id="hero">
            <!-- Background factory image overlay -->
            <div class="hero-bg" style="background-image: url('assets/factory_hero.png');"></div>
            <div class="hero-vignette"></div>

            <div class="hero-content container">
                <!-- Headline -->
                <div class="headline-block reveal-fade" style="transition-delay: 0ms;">
                    <h3 class="coming-soon-title">
                        <span class="title-top">FROM <span class="highlight-text">TIRUPUR</span> TO THE <span
                                class="highlight-text">WORLD</span></span>
                        <span class="title-bottom"><span class="gold-text">CRAFTED FOR GLOBAL BRANDS</span></span>
                    </h3>

                </div>

                <!-- Brand Header (Now centered) -->
                <div class="brand-header reveal-fade" style="transition-delay: 250ms;">
                    <div class="logo-wrapper">
                        <!-- Luxury faceted golden 'A' logo -->
                        <svg class="brand-logo" width="80" height="80" viewBox="0 0 100 100" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#F3D082" />
                                    <stop offset="50%" stop-color="#D4AF37" />
                                    <stop offset="100%" stop-color="#9A7B2C" />
                                </linearGradient>
                            </defs>
                            <path d="M50 12 L82 82 L70 82 L50 45 L30 82 L18 82 L50 12 Z" fill="url(#gold-grad)" />
                            <path d="M50 45 L62 70 H38 L50 45 Z" fill="#0A0A0A" />
                            <path d="M50 12 L50 45 L30 82 L18 82 L50 12 Z" fill="rgba(255, 255, 255, 0.12)" />
                        </svg>
                        <div class="sparkle-flare"></div>
                    </div>

                    <h1 class="brand-title">AUREVON</h1>
                    <div class="brand-subtitle-container">
                        <span class="decor-line"></span>
                        <h2 class="brand-subtitle">APPAREL</h2>
                        <span class="decor-line"></span>
                    </div>
                    <p class="brand-desc">KNIT GARMENT MANUFACTURER & EXPORTER </p>
                </div>

                <!-- Hero Description -->
                <p class="hero-desc reveal-fade" style="transition-delay: 500ms;">
                    Aurevon Apparel is a premium knit garment manufacturer and exporter specializing in high-quality
                    apparel production with fast delivery and a skilled workforce.
                </p>
            </div>
        </header>

    </main>

    <!-- JS Logic Script -->
    <script src="script.js"></script>
</body>

</html>
